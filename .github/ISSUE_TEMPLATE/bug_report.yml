name: Bug report
description: Report reproducible behavior that appears incorrect.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this form for reproducible defects. For early foundation work, include the repository file or document involved.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What appears to be wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest clear reproduction steps.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add environment details, links, screenshots, or related documents if relevant.
    validations:
      required: false
