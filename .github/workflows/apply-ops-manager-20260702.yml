name: Apply Ops Manager Patch

on:
  push:
    branches:
      - codex/apply-ops-manager-20260702

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}
      - name: Apply final recovery plan string-type fix to main
        shell: bash
        env:
          EXPECTED_MAIN: bd8ed056f4329c81475bd2129cd05c977e207120
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          current="$(git rev-parse HEAD)"
          if [ "${current}" != "${EXPECTED_MAIN}" ]; then
            echo "main moved from expected base ${EXPECTED_MAIN} to ${current}; refusing to apply patch"
            exit 1
          fi
          python3 - <<'PY'
          from pathlib import Path
          path = Path('app/desktop/src-tauri/src/pulse_core.rs')
          text = path.read_text()
          old = '"Finder can make window movement and file browsing feel heavier. Smallest action: restart Finder only, not the Mac. Expected interruption: about 5 seconds.",'
          new = '"Finder can make window movement and file browsing feel heavier. Smallest action: restart Finder only, not the Mac. Expected interruption: about 5 seconds.".to_string(),'
          if old not in text:
              raise SystemExit('target Finder care string not found')
          path.write_text(text.replace(old, new, 1))
          PY
          git add app/desktop/src-tauri/src/pulse_core.rs
          git diff --cached --check
          git commit -m "Fix final recovery plan string type"
          git push origin HEAD:main
