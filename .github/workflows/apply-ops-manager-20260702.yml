name: Apply Ops Manager Patch

on:
  push:
    branches:
      - codex/apply-ops-manager-20260702

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Apply verified patch to main
        shell: bash
        env:
          EXPECTED_MAIN: 41e0589bfad1766bebff3f3de6acc453b96fc29e
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git clone --filter=blob:none "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          git fetch origin main
          git checkout -B main origin/main
          current="$(git rev-parse HEAD)"
          if [ "${current}" != "${EXPECTED_MAIN}" ]; then
            echo "main moved from expected base ${EXPECTED_MAIN} to ${current}; refusing to apply patch"
            exit 1
          fi
          cat > /tmp/system-pulse.patch.gz.b64 <<'PATCH_B64'


PATCH_B64
          tr -d '\n' < /tmp/system-pulse.patch.gz.b64 | base64 -d | gzip -d > /tmp/system-pulse.patch
          git apply --check /tmp/system-pulse.patch
          git apply /tmp/system-pulse.patch
          git status --short
          git add CURRENT_SPRINT.md app/desktop/src-tauri/src/pulse_core.rs app/desktop/src/main.ts app/desktop/src/styles.css
          git commit -m "Frame care as recovery plan"
          git push origin HEAD:main
