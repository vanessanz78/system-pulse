name: Apply Ops Manager Patch

on:
  push:
    branches:
      - codex/apply-ops-manager-20260702

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}
      - name: Apply verified patch to main
        shell: bash
        env:
          EXPECTED_MAIN: 41e0589bfad1766bebff3f3de6acc453b96fc29e
          PATCH_SOURCE_COMMIT: 601a3854acc65e2724ae04b207a6f7c5e11679f9
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git show "${PATCH_SOURCE_COMMIT}:.github/workflows/apply-ops-manager-20260702.yml" \
            | awk '/PATCH_B64/{seen += 1; next} seen == 1 {print}' \
            | tr -d '[:space:]' \
            | base64 -d \
            | gzip -d > /tmp/system-pulse.patch
          git fetch origin main
          git checkout -B main origin/main
          current="$(git rev-parse HEAD)"
          if [ "${current}" != "${EXPECTED_MAIN}" ]; then
            echo "main moved from expected base ${EXPECTED_MAIN} to ${current}; refusing to apply patch"
            exit 1
          fi
          git apply --check /tmp/system-pulse.patch
          git apply /tmp/system-pulse.patch
          git add CURRENT_SPRINT.md app/desktop/src-tauri/src/pulse_core.rs app/desktop/src/main.ts app/desktop/src/styles.css
          git diff --cached --check
          git commit -m "Frame care as recovery plan"
          git push origin HEAD:main
