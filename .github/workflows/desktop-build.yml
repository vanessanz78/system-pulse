name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/desktop-build.yml"
      - "app/desktop/**"
      - "package.json"
      - "pnpm-workspace.yaml"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS
            os: macos-latest
            artifact: system-pulse-macos
          - label: Windows
            os: windows-latest
            artifact: system-pulse-windows
          - label: Linux
            os: ubuntu-22.04
            artifact: system-pulse-linux

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install JavaScript dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Check TypeScript
        run: pnpm check

      - name: Generate desktop icons
        run: pnpm --filter @system-pulse/desktop prepare:icons

      - name: Build desktop app
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            pnpm --filter @system-pulse/desktop exec tauri build --bundles app
          else
            pnpm --filter @system-pulse/desktop build
          fi

      - name: Add macOS UAT install notes
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cat > app/desktop/src-tauri/target/release/bundle/MACOS-UAT-INSTALL-NOTES.txt <<'EOF'
          System Pulse macOS UAT build
          ============================

          This build is for private testing only. It is ad-hoc signed, but it is
          not Apple Developer ID signed or notarized yet.

          This GitHub artifact contains a zipped System Pulse.app bundle for UAT.

          If macOS says the app is damaged or cannot be opened:

          1. Click Cancel.
          2. Copy System Pulse.app into Applications.
          3. Open Terminal and run:

             xattr -dr com.apple.quarantine "/Applications/System Pulse.app" && open "/Applications/System Pulse.app"

          This only removes the download quarantine flag from this UAT app.
          Public releases must use Apple Developer ID signing and notarization.
          EOF

          cat > app/desktop/src-tauri/target/release/bundle/open-system-pulse-uat.command <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          app_path="/Applications/System Pulse.app"

          if [ ! -d "$app_path" ]; then
            echo "Copy System Pulse.app into Applications first, then run this helper again."
            exit 1
          fi

          xattr -dr com.apple.quarantine "$app_path" 2>/dev/null || true
          open "$app_path"
          EOF

          chmod +x app/desktop/src-tauri/target/release/bundle/open-system-pulse-uat.command

      - name: Upload desktop bundle
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: app/desktop/src-tauri/target/release/bundle/**
          if-no-files-found: error
