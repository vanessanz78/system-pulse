name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/desktop-build.yml"
      - "app/desktop/**"
      - "package.json"
      - "pnpm-workspace.yaml"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS
            os: macos-latest
            artifact: system-pulse-macos
          - label: Windows
            os: windows-latest
            artifact: system-pulse-windows
          - label: Linux
            os: ubuntu-22.04
            artifact: system-pulse-linux

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install JavaScript dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Check TypeScript
        run: pnpm check

      - name: Generate desktop icons
        run: pnpm --filter @system-pulse/desktop prepare:icons

      - name: Build desktop app
        run: pnpm --filter @system-pulse/desktop build

      - name: Upload desktop bundle
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: app/desktop/src-tauri/target/release/bundle/**
          if-no-files-found: error
