<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">System Pulse product preview</title>
  <desc id="desc">A dark System Pulse window with a green score ring, resource cards, and a calm recovery plan.</desc>
  <defs>
    <radialGradient id="pulseGlow" cx="27%" cy="20%" r="42%">
      <stop offset="0%" stop-color="#9af36f" stop-opacity="0.28"/>
      <stop offset="52%" stop-color="#1b3327" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#04100f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#152522" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#081111" stop-opacity="0.96"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect width="1280" height="760" fill="#030909"/>
  <rect width="1280" height="760" fill="url(#pulseGlow)"/>
  <g filter="url(#softShadow)">
    <rect x="88" y="70" width="1104" height="620" rx="18" fill="url(#glass)" stroke="#cbedda" stroke-opacity="0.26" stroke-width="2"/>
    <rect x="88" y="70" width="1104" height="48" rx="18" fill="#1d2423" opacity="0.9"/>
    <circle cx="120" cy="94" r="8" fill="#ff5f57"/>
    <circle cx="146" cy="94" r="8" fill="#ffbd2e"/>
    <circle cx="172" cy="94" r="8" fill="#28c840"/>
    <text x="640" y="100" text-anchor="middle" fill="#f2f7f0" opacity="0.82" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="700">System Pulse</text>
    <circle cx="270" cy="244" r="78" fill="#06100f" stroke="#9af36f" stroke-width="5"/>
    <circle cx="270" cy="244" r="76" fill="none" stroke="#9af36f" stroke-opacity="0.26" stroke-width="20"/>
    <text x="270" y="270" text-anchor="middle" fill="#f8fbf6" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="64" font-weight="800">87</text>
    <text x="430" y="206" fill="#f8fbf6" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="44" font-weight="800">Good afternoon, Vanessa.</text>
    <text x="430" y="248" fill="#c9d4cf" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24">You are in a good place to focus.</text>
    <line x1="430" y1="296" x2="1100" y2="296" stroke="#cbedda" stroke-opacity="0.16" stroke-width="2"/>
    <text x="430" y="338" fill="#a9b6b0" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="700">Estimated uninterrupted work time</text>
    <text x="430" y="394" fill="#9af36f" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="48" font-weight="800">4h 00m</text>
    <text x="430" y="426" fill="#c9d4cf" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20">Plenty of time for deep work.</text>
    <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
      <g transform="translate(158 472)">
        <rect width="228" height="128" rx="8" fill="#101b1b" stroke="#cbedda" stroke-opacity="0.18"/>
        <circle cx="202" cy="28" r="6" fill="#9af36f"/>
        <text x="24" y="52" fill="#f8fbf6" font-size="24" font-weight="800">Applications</text>
        <text x="24" y="84" fill="#9af36f" font-size="20" font-weight="800">Good</text>
      </g>
      <g transform="translate(414 472)">
        <rect width="228" height="128" rx="8" fill="#101b1b" stroke="#cbedda" stroke-opacity="0.18"/>
        <circle cx="202" cy="28" r="6" fill="#9af36f"/>
        <text x="24" y="52" fill="#f8fbf6" font-size="24" font-weight="800">Memory</text>
        <text x="24" y="84" fill="#9af36f" font-size="20" font-weight="800">Good</text>
      </g>
      <g transform="translate(670 472)">
        <rect width="228" height="128" rx="8" fill="#101b1b" stroke="#ffb534" stroke-opacity="0.28"/>
        <circle cx="202" cy="28" r="6" fill="#ffb534"/>
        <text x="24" y="52" fill="#f8fbf6" font-size="24" font-weight="800">Browser</text>
        <text x="24" y="84" fill="#ffb534" font-size="20" font-weight="800">Needs care</text>
      </g>
      <g transform="translate(926 472)">
        <rect width="228" height="128" rx="8" fill="#101b1b" stroke="#cbedda" stroke-opacity="0.18"/>
        <circle cx="202" cy="28" r="6" fill="#9af36f"/>
        <text x="24" y="52" fill="#f8fbf6" font-size="24" font-weight="800">Storage</text>
        <text x="24" y="84" fill="#9af36f" font-size="20" font-weight="800">Good</text>
      </g>
    </g>
  </g>
</svg>
